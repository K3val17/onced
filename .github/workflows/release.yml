name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal && rustup default stable

      - name: Build release binaries
        run: |
          cargo build --release -p onced-gateway
          cargo build --release -p onced-fast

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/onced-gateway dist/onced-gateway-linux-x86_64
          cp target/release/onced-fast     dist/onced-fast-linux-x86_64
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --title "Onced ${GITHUB_REF_NAME}"
